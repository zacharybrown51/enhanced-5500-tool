<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mammini 401k Prospector</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f3f7fb;--bg2:rgba(255,255,255,.84);--bg3:#eef4fb;--bg4:#d9e4f1;--bg5:#c8d5e5;
--tx:#183042;--tx2:#476174;--tx3:#7c93a5;--txh:#102433;
--acc:#1a8dff;--acc2:#0f6dd1;
--teal:#22b8a6;--teal2:#148374;
--coral:#f26f57;--coral2:#d95842;
--sand:#dfe9f4;--sand2:#bfd0e1;
--brd:rgba(155,177,199,.28);--brd2:rgba(135,160,186,.32);
--up:#22b8a6;--dn:#f26f57;
--shadow-sm:0 8px 24px rgba(14,35,56,.06);
--shadow-md:0 18px 48px rgba(14,35,56,.10);
--glass:rgba(255,255,255,.72);
}
body{font-family:'Jost',sans-serif;background:radial-gradient(circle at top left,rgba(26,141,255,.12),transparent 24%),radial-gradient(circle at top right,rgba(34,184,166,.10),transparent 20%),linear-gradient(180deg,#f6f9fc 0%,#eef4fb 100%);color:var(--tx);min-height:100vh;font-size:13px;padding-top:64px}
body.hm-lock{overflow:hidden}
.app{display:flex;flex-direction:column;min-height:100vh;height:auto;min-width:1024px}
body.hm-lock .app{height:calc(100dvh - 64px);min-height:calc(100dvh - 64px)}
.hdr{background:linear-gradient(90deg,#0f2233 0%,#163247 55%,#18394f 100%);border-bottom:1px solid rgba(255,255,255,.08);padding:0 18px;display:flex;align-items:center;height:64px;flex-shrink:0;gap:14px;box-shadow:0 14px 34px rgba(9,22,33,.26);position:fixed;top:0;left:0;right:0;z-index:5000}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-logo svg{width:28px;height:28px}
.hdr-logo span{font-family:'Jost',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#f5efe7}
.hdr-sep{width:1px;height:22px;background:rgba(255,255,255,.2)}
.tabs{display:flex;align-self:stretch}.tab{padding:0 18px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:#8a9aa6;cursor:pointer;border:none;background:none;font-family:'Jost',sans-serif;border-bottom:2px solid transparent;transition:all .15s;height:100%;display:flex;align-items:center}
.tab:hover{color:#c8d4de}.tab.active{color:#3eaac4;border-bottom-color:#118aa9}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:16px}.hdr-stat{font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.6px;color:#8a9aa6;font-weight:500}.hdr-stat b{color:#b8c8d4;font-family:'IBM Plex Mono',monospace;font-weight:600}
.market-strip{display:flex;align-items:center;gap:7px;position:relative}
.market-live{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.market-live-dot{width:6px;height:6px;border-radius:50%;background:#53d3b0;box-shadow:0 0 6px rgba(83,211,176,.6);animation:mktPulse 2s ease-in-out infinite}
.market-live-text{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5)}
.market-live.mkt-closed .market-live-dot{background:#8aa0b1;box-shadow:none;animation:none}
.market-live.mkt-closed .market-live-text{color:rgba(255,255,255,.35)}
.market-live.mkt-prepost .market-live-dot{background:#f5a623;box-shadow:0 0 6px rgba(245,166,35,.5);animation:mktPulse 3s ease-in-out infinite}
.market-live.mkt-prepost .market-live-text{color:rgba(255,255,255,.5)}
@keyframes mktPulse{0%,100%{opacity:1;box-shadow:0 0 6px rgba(83,211,176,.6)}50%{opacity:.4;box-shadow:0 0 2px rgba(83,211,176,.2)}}
@keyframes mktFadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.market-card{min-width:148px;padding:8px 11px 7px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.05));backdrop-filter:blur(10px);box-shadow:inset 0 1px 0 rgba(255,255,255,.05);transition:all .25s ease;cursor:pointer;position:relative}
.market-card:hover{background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.08));border-color:rgba(255,255,255,.18);transform:translateY(-1px)}
.market-card.mkt-loaded{animation:mktFadeIn .5s ease both}
.market-card:nth-child(2).mkt-loaded{animation-delay:.08s}
.market-card:nth-child(3).mkt-loaded{animation-delay:.16s}
.market-card:nth-child(4).mkt-loaded{animation-delay:.24s}
.market-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.market-label{font-family:'Jost',sans-serif;font-size:9.5px;letter-spacing:.9px;text-transform:uppercase;color:#9fb5c6;font-weight:600}
.market-spark{height:18px;width:48px;display:inline-block;vertical-align:middle}
.market-value-row{display:flex;align-items:baseline;gap:6px}
.market-price{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#edf6fd}
.market-change{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700}
.market-pts{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.35);margin-left:2px}
.text-green{color:#53d3b0;text-shadow:0 0 8px rgba(83,211,176,.3)}
.text-red{color:#ff8a76;text-shadow:0 0 8px rgba(255,138,118,.3)}
.market-loading .market-price,.market-loading .market-change{color:#8aa0b1}
.market-ts{font-family:'IBM Plex Mono',monospace;font-size:7.5px;color:rgba(255,255,255,.3);letter-spacing:.3px;margin-top:2px}
.market-arrow{font-size:8px;margin-right:1px}
.market-detail{display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a2e3b;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;min-width:200px;z-index:6000;box-shadow:0 12px 32px rgba(0,0,0,.4)}
.market-detail.mkt-detail-open{display:block}
.market-detail-row{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.6);padding:3px 0}
.market-detail-row span:last-child{color:#edf6fd;font-weight:600}
.market-detail-spark{height:36px;width:100%;margin-top:6px}
.market-value-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-top:4px}
.market-price{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#edf6fd}
.market-change{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700}
.text-green{color:#53d3b0;text-shadow:0 0 8px rgba(83,211,176,.3)}
.text-red{color:#ff8a76;text-shadow:0 0 8px rgba(255,138,118,.3)}
.market-loading .market-price,.market-loading .market-change{color:#8aa0b1}
.main{flex:1;overflow:visible;display:block}.panel{display:none;overflow:visible}.panel.active{display:block}
.hero{display:flex;gap:14px;border-bottom:1px solid transparent;padding:16px 18px 8px;background:linear-gradient(180deg,rgba(255,255,255,.42),rgba(255,255,255,0))}
.hero-cell{flex:1;padding:24px 28px;border:1px solid var(--brd);position:relative;overflow:hidden;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(245,250,255,.78));backdrop-filter:blur(10px);box-shadow:var(--shadow-sm)}
.hero-cell:last-child{border-right:1px solid var(--brd)}
.hero-cell:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(241,248,255,.88))}
.hero-label{font-family:'Jost',sans-serif;font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx3);margin-bottom:8px;font-weight:600}
.hero-val{font-family:'IBM Plex Mono',monospace;font-size:36px;font-weight:700;letter-spacing:-2px;line-height:1}
.hero-sub{font-size:11px;color:var(--tx3);margin-top:6px;font-family:'Jost',sans-serif}
.hero-accent{position:absolute;bottom:0;left:0;height:3px;transition:width .8s ease}
.v-grn{color:var(--teal2)}.v-amb{color:var(--coral)}.v-wht{color:var(--txh)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px 18px 18px;overflow:visible}
.dash-card{border:1px solid var(--brd);padding:0;overflow:visible;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(247,250,253,.82));box-shadow:var(--shadow-sm);backdrop-filter:blur(10px)}
.dash-card:nth-child(2n){border-right:1px solid var(--brd)}
.dc-hdr{padding:14px 20px 10px;display:flex;justify-content:space-between;align-items:center}
.dc-title{font-family:'Jost',sans-serif;font-size:12.5px;letter-spacing:.2px;color:var(--tx2);font-weight:700}
.dc-badge{font-family:'Jost',sans-serif;font-size:10px;color:var(--acc2);background:rgba(17,138,169,.15);padding:3px 9px;border-radius:999px;font-weight:600;letter-spacing:.2px}
.dc-body{padding:4px 20px 18px;max-height:none;overflow:visible}
.signal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.signal-card{padding:12px 14px;border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.signal-card:hover{border-color:var(--acc);transform:translateY(-1px)}
.signal-card.is-active{border-color:rgba(26,141,255,.45);box-shadow:0 14px 28px rgba(26,141,255,.14);transform:translateY(-1px)}
.ov-stage{animation:ovStageIn .3s ease}
.ov-hero-card,.ov-side-card,.dash-card,.ov-filter-bar{transition:transform .22s ease,box-shadow .22s ease,opacity .22s ease}
.ov-kpi,.signal-card,.rk-row,.comp-row,.ov-pill,.dc-badge,.rk-bar{transition:transform .22s ease,opacity .22s ease,background .22s ease,width .35s ease}
.ov-stage .ov-hero-card{animation:ovFadeUp .26s ease both}
.ov-stage .ov-side-card:nth-child(1){animation:ovFadeUp .3s ease .03s both}
.ov-stage .ov-side-card:nth-child(2){animation:ovFadeUp .32s ease .06s both}
.ov-stage .ov-filter-bar{animation:ovFadeUp .28s ease .04s both}
.ov-stage .dash-card:nth-of-type(1){animation:ovFadeUp .3s ease .05s both}
.ov-stage .dash-card:nth-of-type(2){animation:ovFadeUp .32s ease .08s both}
.ov-stage .dash-card:nth-of-type(3){animation:ovFadeUp .34s ease .11s both}
.ov-stage .dash-card:nth-of-type(4){animation:ovFadeUp .36s ease .14s both}
.ov-stage .ov-kpi:nth-child(1),.ov-stage .signal-card:nth-child(1){animation:ovSoftPop .28s ease .04s both}
.ov-stage .ov-kpi:nth-child(2),.ov-stage .signal-card:nth-child(2){animation:ovSoftPop .3s ease .07s both}
.ov-stage .ov-kpi:nth-child(3),.ov-stage .signal-card:nth-child(3){animation:ovSoftPop .32s ease .1s both}
.ov-stage .ov-kpi:nth-child(4){animation:ovSoftPop .34s ease .13s both}
.ov-kpi-val,.signal-ct{transition:opacity .18s ease,transform .22s ease}
.ov-stage .ov-kpi-val,.ov-stage .signal-ct{animation:ovNumberSettle .34s ease both}
@keyframes ovFadeUp{0%{opacity:.0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes ovSoftPop{0%{opacity:.0;transform:translateY(6px) scale(.985)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes ovNumberSettle{0%{opacity:.0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
@keyframes ovStageIn{0%{opacity:.78}100%{opacity:1}}
.ov-filter-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 18px 14px;padding:12px 14px;border:1px solid rgba(26,141,255,.16);border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(241,248,255,.86));box-shadow:var(--shadow-sm)}
.ov-filter-copy{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ov-filter-label{font-family:'Jost',sans-serif;font-size:11px;font-weight:600;color:var(--tx2)}
.ov-filter-pill{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;border-radius:999px;background:rgba(17,138,169,.08);border:1px solid rgba(17,138,169,.14);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--acc2)}
.ov-filter-clear{padding:8px 12px;border-radius:999px;border:1px solid var(--brd2);background:rgba(255,255,255,.86);color:var(--tx2);font-size:10px;cursor:pointer;font-family:'Jost',sans-serif;text-transform:uppercase;letter-spacing:.9px;font-weight:700;transition:all .18s}
.ov-filter-clear:hover{border-color:rgba(26,141,255,.42);color:var(--acc2);transform:translateY(-1px)}
.signal-ct{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;line-height:1}
.signal-nm{font-size:10px;color:var(--tx2);margin-top:4px;font-family:'Jost',sans-serif}
.signal-desc{font-size:8px;color:var(--tx3);margin-top:2px;font-family:'Jost',sans-serif}
.funnel{display:flex;flex-direction:column;gap:6px}
.funnel-step{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:5px;cursor:pointer;transition:all .15s}
.funnel-step:hover{transform:translateX(4px)}
.funnel-num{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;min-width:70px}
.funnel-info{flex:1}
.funnel-label{font-size:11px;color:var(--tx2);font-family:'Jost',sans-serif;font-weight:500}
.funnel-detail{font-size:9px;color:var(--tx3);font-family:'Jost',sans-serif}
.funnel-bar{height:4px;border-radius:2px;margin-top:4px}
.rk-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--brd)}
.rk-row:last-child{border-bottom:none}
.rk-rank{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);width:18px;text-align:right}
.rk-name{flex:1;font-size:12px;color:var(--tx);font-family:'Jost',sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rk-bar-wrap{width:120px;height:6px;background:var(--brd);border-radius:3px;overflow:hidden}
.rk-bar{height:100%;border-radius:3px}
.rk-ct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);min-width:90px;text-align:right}
.comp-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .1s}
.comp-row:hover{background:var(--bg3)}
.comp-row:last-child{border-bottom:none}
.comp-icon{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.comp-name{font-size:12px;color:var(--tx);font-family:'Jost',sans-serif;flex:1}
.comp-val{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx2)}
.comp-pct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);min-width:40px;text-align:right}
.platform-bar{display:flex;height:28px;border-radius:4px;overflow:hidden;margin-bottom:8px}
.platform-seg{transition:all .2s;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;color:#fff;font-weight:600}
.platform-seg:hover{filter:brightness(1.2)}
.platform-legend{display:flex;gap:16px;flex-wrap:wrap}
.platform-leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tx2);font-family:'Jost',sans-serif}
.platform-dot{width:8px;height:8px;border-radius:2px}
.tbl-filters{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex-shrink:0}
input,select{background:#fff;border:1px solid var(--brd);color:var(--tx);padding:5px 9px;border-radius:4px;font-size:11px;font-family:'Jost',sans-serif}
input:focus,select:focus{outline:none;border-color:var(--acc)}select{cursor:pointer}
.range-grp{display:flex;align-items:center;gap:3px}.range-grp input{width:70px}.range-grp span{color:var(--tx3);font-size:10px;font-family:'Jost',sans-serif}
.btn{padding:8px 15px;border-radius:999px;border:1px solid var(--brd2);background:rgba(255,255,255,.86);color:var(--tx2);font-size:10px;cursor:pointer;font-family:'Jost',sans-serif;text-transform:uppercase;letter-spacing:.9px;font-weight:700;transition:all .18s;box-shadow:0 6px 16px rgba(16,36,51,.06)}
.btn:hover{border-color:rgba(26,141,255,.42);color:var(--acc2);transform:translateY(-1px);box-shadow:0 12px 24px rgba(26,141,255,.12)}
.btn-grn{background:linear-gradient(135deg,var(--acc) 0%,#1f7df0 100%);border-color:transparent;color:#fff}.btn-grn:hover{background:linear-gradient(135deg,var(--acc2) 0%,#1362bf 100%)}
.info-bar{padding:8px 16px;background:var(--bg);display:flex;justify-content:space-between;align-items:center;font-family:'Jost',sans-serif;font-size:10.5px;color:var(--tx3);flex-shrink:0;border-bottom:1px solid var(--brd);letter-spacing:.15px}
.tbl-wrap{flex:1;overflow-y:auto}table{width:100%;border-collapse:collapse}thead{position:sticky;top:0;z-index:10}
th{background:var(--bg3);padding:8px 10px;text-align:left;font-family:'Jost',sans-serif;font-size:10.5px;text-transform:uppercase;letter-spacing:.55px;color:var(--tx3);border-bottom:1px solid var(--brd);cursor:pointer;user-select:none;white-space:nowrap;font-weight:600}
th:hover{color:var(--acc2)}th .sa{margin-left:3px;font-size:7px}
td{padding:8px 10px;border-bottom:1px solid var(--brd);font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.35;white-space:nowrap}
tr{transition:background .1s;cursor:pointer}tr:hover td{background:rgba(17,138,169,.06)}tr.sel td{background:rgba(17,138,169,.12)}
.sc{display:inline-block;min-width:28px;text-align:center;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:700}
.sc-h{background:rgba(238,107,77,.15);color:#d4573a}.sc-w{background:rgba(62,142,138,.15);color:#2d7572}.sc-m{background:rgba(17,138,169,.15);color:#0d7a96}.sc-c{background:rgba(34,55,67,.08);color:#8a9aa6}
.un{background:var(--bg5);color:var(--coral);padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600}
.pv-tag{color:var(--tx2);font-size:10.5px;max-width:140px;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:middle;font-family:'Jost',sans-serif;line-height:1.35}
.sig-tag{display:inline-block;padding:2px 6px;border-radius:999px;font-size:8.5px;font-weight:700;letter-spacing:.2px;margin-right:3px;font-family:'Jost',sans-serif}
.pg{display:flex;gap:3px;align-items:center}
.pg-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--brd);background:#fff;color:var(--tx2);font-size:10px;cursor:pointer;font-family:'Jost',sans-serif;font-weight:500}
.pg-btn:hover{border-color:var(--acc)}.pg-btn:disabled{opacity:.3;cursor:not-allowed}.pg-info{font-size:10px;color:var(--tx3);margin:0 6px}
input[type="checkbox"]{accent-color:#118aa9;width:14px;height:14px;cursor:pointer}
#mapDiv{height:100%;border-radius:0}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.cc{background:var(--bg2);border:1px solid var(--brd);border-radius:6px;padding:12px;cursor:pointer;transition:all .15s;font-family:'Jost',sans-serif}
.cc:hover{border-color:var(--acc)}.cc-n{font-weight:600;font-size:13px;color:var(--txh);margin-bottom:6px}
.cc-r{display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-bottom:3px}.cc-r span:last-child{color:var(--tx2);font-family:'IBM Plex Mono',monospace}
.dtl{position:fixed;top:64px;right:0;width:560px;height:calc(100dvh - 64px);background:#fff;border-left:1px solid var(--brd);z-index:1000;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.12)}
.dtl.open{transform:translateX(0)}.dtl-hdr{padding:14px 16px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:5}
.dtl-x{width:28px;height:28px;border-radius:4px;border:1px solid var(--brd2);background:none;color:var(--tx3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.dtl-x:hover{border-color:var(--coral);color:var(--coral)}.dtl-b{padding:16px}.dtl-sec{margin-bottom:16px}
.dtl-st{font-family:'Jost',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--acc);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--brd);font-weight:700}
.dtl-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:stretch}

.az-spinner{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:azSpin .8s linear infinite;margin:0 auto}

  gap:6px;
}

.toolbar button{
  padding:6px 10px;
  font-size:13px;
  border-radius:8px;
}
.toolbar input[type="text"],
.toolbar input[type="number"]{
  width:70px;
}
.toolbar{
  flex-wrap:nowrap;
}

.toolbar,
.filters-row{
  gap:5px;
}

function feeBenchmarkHtml(assets,expenseRatio,totalExpenses,participants){

  if(avgBalance&&!p[23]){ p[23]=avgBalance; e.notes.push('Average balance derived from assets and participant count.'); }

  var adminExpenses=Number(p[29])||0;
  var totalContrib=Number(p[30])||0;
  var expenseRatioRaw=Number(p[31]);
  var eligible=Number(p[32])||0;
  var employerContrib=Number(p[33])||0;
  var employeeContrib=Number(p[34])||0;
  var totalExpenses=Number(p[35])||0;

var expenseRatioPct = null;
if(isFinite(expenseRatioRaw) && expenseRatioRaw > 0){

  if(expenseRatioRaw < 0.2){

if(expenseRatioPct === null && adminExpenses > 0 && assets > 0){

  e.derived.adminExpenses=adminExpenses||null;

  if(!advisor){ addSignal('NAD'); e.warnings.push('Advisor not listed in current filing data.'); }

}
if(contribRatioPct!=null && assets>=2000000 && parts>=25 && contribRatioPct<2.5){ addSignal('LCT'); e.notes.push('Contribution activity looks light relative to plan assets.'); }
  if(participationRatePct!=null && eligible>=30 && participationRatePct<65){ addSignal('LPR'); e.warnings.push('Participation rate appears light relative to eligible employees.'); }

  if(!e.features.autoEnroll && assets>=5000000 && parts>=50){ addSignal('NAE'); }
  if(insuranceBased && assets>=1000000){ addSignal('INS'); }

  if((assets>0&&parts===0) || (assets>=500000&&parts>0&&avgBalance<1500) || (assetsBoy===0&&assets>0&&growth<-15) || (contribRatioPct!=null&&contribRatioPct>40) || (eligible>0&&parts>eligible*1.15)){ addSignal('DQR'); e.warnings.push('One or more plan metrics look unusual and should be reviewed against the filing.'); }

  if(parts>=25&&assets>0&&avgBalance>300000) e.notes.push('High average balance profile.');
  if(isFinite(growth)&&growth>=40 && assets>=1000000) e.notes.push('Strong year-over-year asset growth.');
  if(isFinite(growth)&&growth<=-25 && assets>=1000000) e.warnings.push('Meaningful asset decline year over year.');
  if(e.schedules.C) e.notes.push('Schedule C provider compensation detail available.');
  if(e.schedules.A) e.notes.push('Schedule A insurance detail available.');
  if(e.features.loans) e.notes.push('Participant loans appear to be permitted.');
  if(e.features.roth) e.notes.push('Roth feature appears to be available.');

  var confCount=0, confScore=0;
  function setConfidence(key,label){

  }
  setConfidence('assets', assets>0?'high':'low');
  setConfidence('participants', parts>0?'high':'low');
  setConfidence('recordkeeper', rk?'high':'low');
  setConfidence('advisor', advisor?'medium':'low');
  setConfidence('avgBalance', avgBalance?(p[23]===avgBalance&&Number(p[23])===avgBalance?'high':'medium'):'low');
  var feeConfidence='low';
if(expenseRatioPct!=null){

  setConfidence('participation', participationRatePct!=null?'medium':'low');

  var overall=confCount?confScore/confCount:1;

function fmtMarketPrice(v){
  var n=Number(v);

}

}
function buildSparkSVG(data, w, h, color) {
  if (!data || data.length < 2) return '';
  var mn = Math.min.apply(null, data), mx = Math.max.apply(null, data);
  var range = mx - mn || 1;
  var pts = data.map(function(v, i) {
    var x = (i / (data.length - 1)) * w;
    var y = h - ((v - mn) / range) * (h - 2) - 1;
    return x.toFixed(1) + ',' + y.toFixed(1);
  });
  return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="display:block">'
    + '<polyline points="' + pts.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>'
    + '</svg>';
}
function marketCardHTML(item, quote) {
  quote = quote || {};
  var pct = Number(quote.changesPercentage);

  var arrow = isFinite(pct) ? (pct >= 0 ? '<span class="market-arrow">&#9650;</span>' : '<span class="market-arrow">&#9660;</span>') : '';
  var loaded = quote.symbol ? 'mkt-loaded' : 'market-loading';
  var sparkColor = isFinite(pct) ? (pct >= 0 ? '#53d3b0' : '#ff8a76') : '#8aa0b1';
  var sparkHtml = (quote.sparkline && quote.sparkline.length > 1) ? '<div class="market-spark">' + buildSparkSVG(quote.sparkline, 48, 18, sparkColor) + '</div>' : '';
  var bigSparkHtml = (quote.sparkline && quote.sparkline.length > 1) ? '<div class="market-detail-spark">' + buildSparkSVG(quote.sparkline, 172, 36, sparkColor) + '</div>' : '';
  var changePts = quote.change != null ? (quote.change >= 0 ? '+' : '') + quote.change.toFixed(2) : '';

  var detail = '<div class="market-detail">';
  detail += '<div class="market-detail-row"><span>Previous Close</span><span>' + (quote.previousClose ? fmtMarketPrice(quote.previousClose) : '--') + '</span></div>';
  detail += '<div class="market-detail-row"><span>Change</span><span class="' + cls + '">' + (changePts || '--') + '</span></div>';
  detail += '<div class="market-detail-row"><span>Change %</span><span class="' + cls + '">' + (isFinite(pct) ? (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%' : '--') + '</span></div>';
  if (quote.sparkline && quote.sparkline.length > 1) {
    var sparkMin = Math.min.apply(null, quote.sparkline);
    var sparkMax = Math.max.apply(null, quote.sparkline);
    detail += '<div class="market-detail-row"><span>5d Range</span><span>' + fmtMarketPrice(sparkMin) + ' – ' + fmtMarketPrice(sparkMax) + '</span></div>';
  }
  detail += bigSparkHtml;
  detail += '</div>';

  return '<div class="market-card ' + loaded + '">'
    + '<div class="market-label-row"><span class="market-label">' + item.label + '</span>' + sparkHtml + '</div>'

    + '</div>'

    + '</div>';

var mktStatus='closed';
var mktLastTs=null;
var mktFirstRender=true;
function renderMarketStrip(quotes){
  var strip=document.getElementById('marketStrip');
  if(!strip)return;
  var bySymbol={};
  var hasData=false;
  (quotes||[]).forEach(function(q){
    if(q&&q.symbol){bySymbol[q.symbol]=q;if(q.price)hasData=true}
  });
  var isOpen=mktStatus==='open';
  var isPrePost=mktStatus==='prepost';
  var statusLabel=isOpen?'Market Open':isPrePost?'Pre/Post Market':'Market Closed';
  var statusCls=isOpen?'':(isPrePost?'mkt-prepost':'mkt-closed');

  // If first render or no cards exist yet, do full innerHTML
  var existingCards=strip.querySelectorAll('.market-card');
  if(mktFirstRender||!existingCards.length||!hasData){
    var tsLabel='';
    if(mktLastTs){
      var d=new Date(mktLastTs*1000);
      var h2=d.getHours(),m2=d.getMinutes(),ampm2=h2>=12?'PM':'AM';
      h2=h2%12||12;
      tsLabel=' \xb7 '+h2+':'+String(m2).padStart(2,'0')+ampm2;
    }
    var liveTag=hasData?'<div class="market-live '+statusCls+'"><div class="market-live-dot"></div><div class="market-live-text">'+statusLabel+tsLabel+'</div></div>':'';
    var cards=MARKET_CONFIG.map(function(item){
      return marketCardHTML(item, bySymbol[item.symbol]);
    }).join('');
    strip.innerHTML=liveTag+cards;
    mktFirstRender=false;
    return;
  }

  // In-place update: just update text values, no DOM rebuild
  // Update live tag
  var liveEl=strip.querySelector('.market-live');
  if(liveEl){
    liveEl.className='market-live '+statusCls;
    var textEl=liveEl.querySelector('.market-live-text');
    if(textEl){
      var tsLabel2='';
      if(mktLastTs){
        var d2=new Date(mktLastTs*1000);
        var h3=d2.getHours(),m3=d2.getMinutes(),ampm3=h3>=12?'PM':'AM';
        h3=h3%12||12;
        tsLabel2=' \xb7 '+h3+':'+String(m3).padStart(2,'0')+ampm3;
      }
      textEl.textContent=statusLabel+tsLabel2;
    }
  }

  // Update each market card in place
  existingCards.forEach(function(card,idx){
    var item=MARKET_CONFIG[idx];
    if(!item)return;
    var quote=bySymbol[item.symbol]||{};
    var pct=Number(quote.changesPercentage);
    var cls=isFinite(pct)?(pct>=0?'text-green':'text-red'):'';
    var arrow=isFinite(pct)?(pct>=0?'\u25B2':'\u25BC'):'';
    var changePts=quote.change!=null?(quote.change>=0?'+':'')+quote.change.toFixed(2):'';

    // Update price
    var priceEl=card.querySelector('.market-price');
    if(priceEl)priceEl.textContent=fmtMarketPrice(quote.price);

    // Update change % with color
    var changeEl=card.querySelector('.market-change');
    if(changeEl){
      changeEl.className='market-change '+cls;
      changeEl.innerHTML=(arrow?'<span class="market-arrow">'+arrow+'</span>':'')+fmtMarketPct(quote.changesPercentage);
    }

    // Update pts
    var ptsEl=card.querySelector('.market-pts');
    if(ptsEl)ptsEl.textContent=changePts;
    else if(changePts){
      var sp=document.createElement('span');
      sp.className='market-pts';
      sp.textContent=changePts;
      var vr=card.querySelector('.market-value-row');
      if(vr)vr.appendChild(sp);
    }

    // Update sparkline
    var sparkEl=card.querySelector('.market-spark');
    if(sparkEl&&quote.sparkline&&quote.sparkline.length>1){
      var sparkColor=isFinite(pct)?(pct>=0?'#53d3b0':'#ff8a76'):'#8aa0b1';
      sparkEl.innerHTML=buildSparkSVG(quote.sparkline,48,18,sparkColor);
    }

    // Update detail panel if it exists
    var detailRows=card.querySelectorAll('.market-detail-row');
    if(detailRows.length>=3){
      var prevSpan=detailRows[0].querySelector('span:last-child');
      if(prevSpan)prevSpan.textContent=quote.previousClose?fmtMarketPrice(quote.previousClose):'--';
      var chgSpan=detailRows[1].querySelector('span:last-child');
      if(chgSpan){chgSpan.className=cls;chgSpan.textContent=changePts||'--'}
      var pctSpan=detailRows[2].querySelector('span:last-child');
      if(pctSpan){pctSpan.className=cls;pctSpan.textContent=isFinite(pct)?(pct>=0?'+':'')+pct.toFixed(2)+'%':'--'}
    }

    // Remove loading state
    card.classList.remove('market-loading');
    if(!card.classList.contains('mkt-loaded'))card.classList.add('mkt-loaded');
  });
}

function fetchNews(){
  fetch('/api/news?_t='+Date.now()).then(function(r){return r.json()}).then(function(data){
    if(!data.ok||!data.items||!data.items.length)return;
    var ticker=document.getElementById('newsTicker');
    var inner=document.getElementById('newsTickerInner');
    if(!ticker||!inner)return;
    // Build doubled content for seamless loop
    var html='';
    for(var pass=0;pass<2;pass++){
      for(var i=0;i<data.items.length;i++){
        if(i>0||pass>0)html+='<span class="news-ticker-sep">\xb7</span>';
        html+='<a class="news-ticker-item" href="'+data.items[i].link+'" target="_blank" rel="noopener">'+data.items[i].title+'</a>';
      }
    }
    inner.innerHTML=html;
    // Calculate animation duration based on content width
    requestAnimationFrame(function(){
      var totalW=inner.scrollWidth/2;
      var duration=Math.max(totalW/40,30);// ~40px/sec, min 30s
      inner.style.animationDuration=duration+'s';
      ticker.classList.add('has-news');
      document.body.classList.add('has-news-ticker');
    });
  }).catch(function(){/* silent fail — news is non-critical */});
}
setTimeout(fetchNews,2000);// fetch news 2s after load

async function fetchMarketIndices(){
  try{
    var resp=await fetch('/api/market-indices?_t='+Date.now(),{cache:'no-store'});
    if(!resp.ok)throw new Error('fn-'+resp.status);
    var data=await resp.json();
    if(data._debug)console.log('[Market]',data.source,data.marketState,data._debug);
    if(data.ok&&Array.isArray(data.quotes)&&data.quotes.length){
      // Use server-determined status, fallback to reading quote marketState directly
      if(data.marketStatus){
        mktStatus=data.marketStatus;
      }else if(data.quotes[0]&&data.quotes[0].marketState){
        var rawState=(data.quotes[0].marketState||'').toUpperCase();
        mktStatus=rawState==='REGULAR'?'open':(rawState==='PRE'||rawState==='POST'||rawState==='POSTPOST')?'prepost':'closed';
      }
      if(data.lastUpdated)mktLastTs=data.lastUpdated;
      renderMarketStrip(data.quotes);
      return;
    }
    throw new Error('fn-empty');
  }catch(e1){
    console.error('Market data error:',e1.message);
    renderMarketStrip([]);
  }
}

document.addEventListener('click',function(e){

  var strip=document.getElementById('marketStrip');
  if(!strip)return;
  if(card&&strip.contains(card)){
    e.stopPropagation();
    var detail=card.querySelector('.market-detail');
    if(!detail)return;
    var wasOpen=detail.classList.contains('mkt-detail-open');
    strip.querySelectorAll('.market-detail').forEach(function(d){d.classList.remove('mkt-detail-open')});
    if(!wasOpen)detail.classList.add('mkt-detail-open');
  }else{
    strip.querySelectorAll('.market-detail').forEach(function(d){d.classList.remove('mkt-detail-open')});
  }
});

// --- Keyboard Shortcuts ---
document.addEventListener('keydown',function(e){
  // Don't fire shortcuts when typing in inputs
  var tag=e.target.tagName;
  var isInput=(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||e.target.isContentEditable);

  // Esc always works — close panels/overlays
  if(e.key==='Escape'){
    // Close detail panel
    var dtl=document.getElementById('dtl');
    if(dtl&&dtl.classList.contains('open')){cD();e.preventDefault();return}
    // Close compare overlay
    var compOv=document.getElementById('compareOv');
    if(compOv&&compOv.classList.contains('open')){compOv.classList.remove('open');e.preventDefault();return}
    // Close snapshot overlay
    var snapOv=document.querySelector('.snap-ov.open');
    if(snapOv){snapOv.classList.remove('open');e.preventDefault();return}
    // Close welcome overlay
    var welOv=document.querySelector('.welcome-ov');
    if(welOv&&welOv.parentNode){welOv.parentNode.removeChild(welOv);e.preventDefault();return}
    // Close provider overlay
    var provOv=document.querySelector('[style*="z-index:4000"]');
    if(provOv&&provOv.parentNode===document.body){document.body.removeChild(provOv);e.preventDefault();return}
    // Close market detail
    var strip=document.getElementById('marketStrip');
    if(strip)strip.querySelectorAll('.market-detail').forEach(function(d){d.classList.remove('mkt-detail-open')});
    return;
  }

  // Skip remaining shortcuts if in input
  if(isInput)return;

  // D - toggle dark mode
  if(e.key==='d'||e.key==='D'){
    if(!e.ctrlKey&&!e.metaKey&&!e.altKey){toggleDark();e.preventDefault();return}
  }

  // / or Ctrl+K - focus search
  if(e.key==='/'||(e.key==='k'&&(e.ctrlKey||e.metaKey))){
    e.preventDefault();
    if(ct==='tbl'){
      var si=document.querySelector('#tfi input[type="text"]');
      if(si)si.focus();
    }else if(ct==='analyze'){
      var li=document.getElementById('azLookupInput');
      if(li)li.focus();
    }
    return;
  }

  // 1-4 for tab switching
  if(e.key>='1'&&e.key<='4'&&!e.ctrlKey&&!e.metaKey&&!e.altKey){
    var tabs=['analyze','dash','tbl','hm'];
    go(tabs[parseInt(e.key)-1]);
    e.preventDefault();
    return;
  }

  // Arrow keys for table navigation on prospects tab
  if(ct==='tbl'&&(e.key==='ArrowDown'||e.key==='ArrowUp')){
    var rows=document.querySelectorAll('#tbd tr[data-idx]');
    if(!rows.length)return;
    var curIdx=-1;
    rows.forEach(function(r,i){if(r.classList.contains('sel'))curIdx=i});
    if(e.key==='ArrowDown')curIdx=Math.min(curIdx+1,rows.length-1);
    else curIdx=Math.max(curIdx-1,0);
    if(curIdx>=0&&rows[curIdx]){
      var planIdx=+rows[curIdx].dataset.idx;
      oD(planIdx,fd);
      rows[curIdx].scrollIntoView({block:'nearest'});
      e.preventDefault();
    }
    return;
  }

  // ? - show keyboard shortcut help
  if(e.key==='?'&&!e.ctrlKey&&!e.metaKey){
    showKbdHelp();
    e.preventDefault();
    return;
  }
});

  card.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:14px;font-weight:700">Keyboard Shortcuts</div><button id="kbdClose" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--tx3)">&times;</button></div>'
  +'<div style="display:grid;grid-template-columns:auto 1fr;gap:8px 14px;font-size:12px">'
  +'<span class="kbd" style="background:var(--bg4);border:1px solid var(--brd);color:var(--tx2)">Esc</span><span>Close panels &amp; overlays</span>'
  +'<span class="kbd" style="background:var(--bg4);border:1px solid var(--brd);color:var(--tx2)">D</span><span>Toggle dark mode</span>'
  +'<span class="kbd" style="background:var(--bg4);border:1px solid var(--brd);color:var(--tx2)">/</span><span>Focus search</span>'
  +'<span class="kbd" style="background:var(--bg4);border:1px solid var(--brd);color:var(--tx2)">1-4</span><span>Switch tabs</span>'
  +'<span class="kbd" style="background:var(--bg4);border:1px solid var(--brd);color:var(--tx2)">↑ ↓</span><span>Navigate prospect rows</span>'
  +'<span class="kbd" style="background:var(--bg4);border:1px solid var(--brd);color:var(--tx2)">?</span><span>Show this help</span>'
  +'</div>';
  ov.appendChild(card);
  document.body.appendChild(ov);
  document.getElementById('kbdClose').addEventListener('click',function(){document.body.removeChild(ov)});
  ov.addEventListener('click',function(e){if(e.target===ov)document.body.removeChild(ov)});
}
})();
